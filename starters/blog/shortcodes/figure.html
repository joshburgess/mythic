<figure style="margin:1.5rem 0;text-align:center">
  <img src="{{ src }}" alt="{{ alt }}"{% if width %} width="{{ width }}"{% endif %} loading="lazy" style="max-width:100%;height:auto;border-radius:4px">
  {% if caption %}<figcaption style="margin-top:0.5rem;color:#666;font-size:0.9rem;font-style:italic">{{ caption }}</figcaption>{% endif %}
</figure>
