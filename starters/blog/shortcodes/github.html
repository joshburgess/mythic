<a href="https://github.com/{{ repo }}" style="display:block;padding:1rem;margin:1rem 0;border:1px solid #e0e0e0;border-radius:8px;text-decoration:none;color:inherit;transition:box-shadow 0.2s" onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,0.1)'" onmouseout="this.style.boxShadow='none'">
  <strong style="color:#0366d6">{{ repo }}</strong>
  {% if description %}<p style="margin:0.25rem 0 0;color:#666;font-size:0.9rem">{{ description }}</p>{% endif %}
</a>
