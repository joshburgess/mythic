<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} — {{ site.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 42rem; margin: 0 auto; padding: 2rem 1rem; }
        header { border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }
        header h1 { font-size: 1.5rem; }
        header h1 a { color: inherit; text-decoration: none; }
        header nav a { margin-right: 1rem; color: #666; text-decoration: none; }
        header nav a:hover { color: #333; }
        article h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        article .meta { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
        article .meta .tag { background: #f0f0f0; padding: 0.1rem 0.5rem; border-radius: 3px; margin-left: 0.25rem; text-decoration: none; color: #666; font-size: 0.8rem; }
        h2, h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
        p { margin-bottom: 1rem; }
        pre { background: #2b303b; color: #c0c5ce; padding: 1rem; border-radius: 4px; overflow-x: auto; margin-bottom: 1rem; }
        code { font-family: "SF Mono", Monaco, monospace; font-size: 0.9em; }
        :not(pre) > code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 3px; }
        ul, ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        table { border-collapse: collapse; margin-bottom: 1rem; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; }
        th { background: #f5f5f5; }
        a { color: #0066cc; }
        footer { border-top: 1px solid #eee; padding-top: 1rem; margin-top: 3rem; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">{{ site.title }}</a></h1>
        <nav>
            <a href="/">Home</a>
            <a href="/tags/">Tags</a>
            <a href="/feed.xml">RSS</a>
        </nav>
    </header>
    <article>
        <h1>{{ page.title }}</h1>
        {% if page.date %}<div class="meta">{{ page.date }}{% if page.tags %} &middot; {% for tag in page.tags %}<a href="/tags/{{ tag }}/" class="tag">{{ tag }}</a>{% endfor %}{% endif %}</div>{% endif %}
        {{ content | safe }}
    </article>
    <footer>
        <p>Built with <a href="https://github.com/joshburgess/mythic">Mythic</a></p>
    </footer>
</body>
</html>
