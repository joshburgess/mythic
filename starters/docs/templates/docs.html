<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} — {{ site.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #f8f9fa; border-right: 1px solid #e9ecef; padding: 2rem 1rem; flex-shrink: 0; }
        .sidebar h2 { font-size: 1.1rem; margin-bottom: 1rem; }
        .sidebar ul { list-style: none; }
        .sidebar li { margin-bottom: 0.5rem; }
        .sidebar a { color: #495057; text-decoration: none; font-size: 0.95rem; }
        .sidebar a:hover { color: #0066cc; }
        .content { flex: 1; max-width: 50rem; padding: 2rem 3rem; }
        .breadcrumb { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .breadcrumb a { color: #888; text-decoration: none; }
        .breadcrumb a:hover { color: #333; }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        h2 { margin-top: 2rem; margin-bottom: 0.5rem; border-bottom: 1px solid #eee; padding-bottom: 0.3rem; }
        h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
        p { margin-bottom: 1rem; }
        pre { background: #2b303b; color: #c0c5ce; padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; }
        code { font-family: "SF Mono", Monaco, monospace; font-size: 0.9em; }
        :not(pre) > code { background: #f0f0f0; padding: 0.15rem 0.4rem; border-radius: 3px; }
        .nav-links { display: flex; justify-content: space-between; margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; }
        .nav-links a { color: #0066cc; text-decoration: none; }
        .toc { position: fixed; right: 2rem; top: 2rem; width: 200px; font-size: 0.85rem; }
        .toc ul { list-style: none; border-left: 2px solid #eee; padding-left: 1rem; }
        .toc a { color: #888; text-decoration: none; }
        .toc a:hover { color: #333; }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e9ecef; }
            .content { padding: 1rem; }
            .toc { display: none; }
        }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h2>{{ site.title }}</h2>
        <ul>
            <li><a href="/">Introduction</a></li>
            <li><a href="/guide/installation/">Installation</a></li>
            <li><a href="/guide/quickstart/">Quickstart</a></li>
        </ul>
    </nav>
    <main class="content">
        <div class="breadcrumb">
            <a href="/">Docs</a> / {{ page.title }}
        </div>
        {{ content | safe }}
    </main>
</body>
</html>
