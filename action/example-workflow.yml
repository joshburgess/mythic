# Example: Deploy a Mythic site to GitHub Pages
# Copy this file to .github/workflows/deploy.yml in your site repository.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build with Mythic
        uses: joshburgess/mythic/action@main
        with:
          version: latest
          config: mythic.toml

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
