<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 42rem; margin: 0 auto; padding: 2rem 1rem; }
        header { border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }
        header h1 { font-size: 1.5rem; }
        header nav a { margin-right: 1rem; color: #666; text-decoration: none; }
        .post-list { list-style: none; }
        .post-list li { margin-bottom: 1.5rem; }
        .post-list .title { font-size: 1.2rem; }
        .post-list .date { color: #888; font-size: 0.9rem; }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        footer { border-top: 1px solid #eee; padding-top: 1rem; margin-top: 3rem; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/tags/">Tags</a>
            <a href="/feed.xml">RSS</a>
        </nav>
    </header>
    <main>
        {{ content | safe }}
    </main>
    <footer>
        <p>Built with <a href="https://github.com/joshburgess/mythic">Mythic</a></p>
    </footer>
</body>
</html>
